<svg viewBox="0 0 900 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node      { fill: #eeede9; stroke: #1b3139; }
    .inner     { fill: #ffffff; stroke: #1b3139; }
    .chip      { fill: #eeede9; stroke: #1b3139; }
    .txt-h     { fill: #0b2026; }
    .txt-b     { fill: #5a6b73; }
    .line      { stroke: #5a6b73; }
    .arrow     { fill: #5a6b73; }

    @media (prefers-color-scheme: dark) {
      .node    { fill: #1f2020; stroke: #ccc; }
      .inner   { fill: #282828; stroke: #ccc; }
      .chip    { fill: #1f2020; stroke: #666; }
      .txt-h   { fill: #ccc; }
      .txt-b   { fill: #999; }
      .line    { stroke: #999; }
      .arrow   { fill: #999; }
    }
  </style>

  <rect width="900" height="500" fill="none"/>

  <!-- Developer entry point (outside the workspace) -->
  <rect x="20" y="200" width="120" height="90" rx="8" class="node" stroke-width="1"/>
  <text x="80" y="232" text-anchor="middle" class="txt-h" font-family="monospace" font-size="13">Developer</text>
  <text x="80" y="254" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">CLI</text>
  <text x="80" y="272" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">+ Coding Agent</text>

  <!-- Arrow from developer into the workspace -->
  <line x1="140" y1="245" x2="178" y2="245" class="line" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="178,240 188,245 178,250" class="arrow"/>

  <!-- Workspace container (everything platform-side lives in here) -->
  <rect x="190" y="20" width="690" height="460" rx="12" class="node" stroke-width="1.5"/>
  <text x="535" y="42" text-anchor="middle" class="txt-h" font-family="monospace" font-size="14">Databricks Workspace</text>

  <!-- Databricks Apps: hosting layer (contains only AppKit) -->
  <rect x="210" y="60" width="650" height="190" rx="10" class="inner" stroke-width="1.5"/>
  <text x="535" y="86" text-anchor="middle" class="txt-h" font-family="monospace" font-size="15">Databricks Apps</text>
  <text x="535" y="104" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Managed hosting platform for web apps</text>

  <!-- AppKit: SDK, the only thing inside Databricks Apps -->
  <rect x="230" y="120" width="610" height="115" rx="8" class="inner" stroke-width="1.5"/>
  <text x="535" y="147" text-anchor="middle" class="txt-h" font-family="monospace" font-size="14">AppKit</text>
  <text x="535" y="165" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">TypeScript SDK with a plugin architecture for workspace resources:</text>

  <!-- AppKit plugin chips, each aligned with its target service below -->
  <rect x="245" y="195" width="105" height="22" rx="4" class="chip" stroke-width="1"/>
  <text x="297.5" y="210" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Lakebase Plugin</text>

  <rect x="385" y="195" width="135" height="22" rx="4" class="chip" stroke-width="1"/>
  <text x="452.5" y="210" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Model Serving Plugin</text>

  <rect x="562" y="195" width="111" height="22" rx="4" class="chip" stroke-width="1"/>
  <text x="617.5" y="210" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Analytics Plugin</text>

  <rect x="733" y="195" width="99" height="22" rx="4" class="chip" stroke-width="1"/>
  <text x="782.5" y="210" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">+ more plugins</text>

  <!-- Lakebase service -->
  <rect x="210" y="285" width="155" height="175" rx="8" class="inner" stroke-width="1.5"/>
  <text x="287.5" y="315" text-anchor="middle" class="txt-h" font-family="monospace" font-size="14">Lakebase</text>
  <text x="287.5" y="340" text-anchor="middle" class="txt-h" font-family="monospace" font-size="11">Managed Postgres</text>
  <text x="287.5" y="358" text-anchor="middle" class="txt-h" font-family="monospace" font-size="11">For OLTP</text>
  <text x="287.5" y="388" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Autoscale</text>
  <text x="287.5" y="406" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Scale to Zero</text>
  <text x="287.5" y="424" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Branching</text>

  <!-- Agent Bricks -->
  <rect x="375" y="285" width="155" height="175" rx="8" class="inner" stroke-width="1.5"/>
  <text x="452.5" y="315" text-anchor="middle" class="txt-h" font-family="monospace" font-size="14">Agent Bricks</text>
  <text x="452.5" y="340" text-anchor="middle" class="txt-h" font-family="monospace" font-size="11">Enterprise agent</text>
  <text x="452.5" y="358" text-anchor="middle" class="txt-h" font-family="monospace" font-size="11">platform</text>
  <text x="452.5" y="388" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Knowledge Assistants</text>
  <text x="452.5" y="406" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Supervisor Agents</text>
  <text x="452.5" y="424" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Custom Python agents</text>

  <!-- Data Lakehouse -->
  <rect x="540" y="285" width="155" height="175" rx="8" class="inner" stroke-width="1.5"/>
  <text x="617.5" y="315" text-anchor="middle" class="txt-h" font-family="monospace" font-size="14">Data Lakehouse</text>
  <text x="617.5" y="340" text-anchor="middle" class="txt-h" font-family="monospace" font-size="11">Unity Catalog +</text>
  <text x="617.5" y="358" text-anchor="middle" class="txt-h" font-family="monospace" font-size="11">Lakeflow</text>
  <text x="617.5" y="388" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Tables, views, volumes</text>
  <text x="617.5" y="406" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Governance</text>
  <text x="617.5" y="424" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Lakeflow Jobs</text>

  <!-- More Plugins (4th column) -->
  <rect x="705" y="285" width="155" height="175" rx="8" class="inner" stroke-width="1.5"/>
  <text x="782.5" y="315" text-anchor="middle" class="txt-h" font-family="monospace" font-size="14">More Plugins</text>
  <text x="782.5" y="340" text-anchor="middle" class="txt-h" font-family="monospace" font-size="11">Additional AppKit</text>
  <text x="782.5" y="358" text-anchor="middle" class="txt-h" font-family="monospace" font-size="11">plugins available</text>
  <text x="782.5" y="388" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Server, Genie, Files,</text>
  <text x="782.5" y="406" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">Jobs, Vector Search,</text>
  <text x="782.5" y="424" text-anchor="middle" class="txt-b" font-family="monospace" font-size="10">and Custom Plugins</text>

  <!-- Connectors: each AppKit chip arrows down to its target service -->
  <line x1="297.5" y1="217" x2="297.5" y2="285" class="line" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="292.5,278 297.5,288 302.5,278" class="arrow"/>

  <line x1="452.5" y1="217" x2="452.5" y2="285" class="line" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="447.5,278 452.5,288 457.5,278" class="arrow"/>

  <line x1="617.5" y1="217" x2="617.5" y2="285" class="line" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="612.5,278 617.5,288 622.5,278" class="arrow"/>

  <line x1="782.5" y1="217" x2="782.5" y2="285" class="line" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="777.5,278 782.5,288 787.5,278" class="arrow"/>
</svg>
