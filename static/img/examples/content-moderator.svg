<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0f172a"/>

  <!-- Author submits -->
  <rect x="30" y="60" width="180" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="120" y="95" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Author</text>
  <text x="120" y="115" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">submits content</text>
  <text x="120" y="140" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">blog | linkedin | twitter</text>

  <line x1="210" y1="110" x2="270" y2="110" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Lakebase -->
  <rect x="270" y="40" width="200" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="370" y="75" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Lakebase Postgres</text>
  <text x="370" y="97" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">content_moderation.</text>
  <text x="370" y="113" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">guidelines | submissions</text>
  <text x="370" y="129" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">ai_analyses | reviews</text>
  <text x="370" y="155" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">per-target rules + content</text>

  <line x1="470" y1="105" x2="530" y2="105" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="500" y="97" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="7">score</text>

  <!-- AI Gateway -->
  <rect x="530" y="55" width="160" height="100" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="610" y="90" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11">AI Gateway</text>
  <text x="610" y="110" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Model Serving</text>
  <text x="610" y="130" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">guidelines + content � score</text>

  <line x1="690" y1="105" x2="740" y2="105" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- App -->
  <rect x="740" y="30" width="420" height="200" rx="12" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="950" y="65" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13">Content Moderator</text>
  <text x="950" y="85" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Databricks App (AppKit)</text>

  <rect x="765" y="105" width="90" height="36" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="810" y="128" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Queue</text>

  <rect x="870" y="105" width="80" height="36" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="910" y="128" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Submit</text>

  <rect x="965" y="105" width="90" height="36" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1010" y="128" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Guidelines</text>

  <rect x="1068" y="105" width="70" height="36" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1103" y="128" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Analytics</text>

  <!-- Review detail inside app -->
  <rect x="765" y="158" width="195" height="52" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="862" y="178" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">AI Score: 72/100</text>
  <text x="862" y="196" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">issues | suggestions | decision</text>

  <rect x="975" y="158" width="163" height="52" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="1056" y="178" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">Moderator Review</text>
  <text x="1056" y="196" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">approve | reject | revise</text>

  <!-- SQL Warehouse -->
  <rect x="350" y="260" width="220" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="460" y="295" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">SQL Warehouse</text>
  <text x="460" y="315" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">content_overview.sql</text>
  <text x="460" y="335" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">submissions_by_target.sql</text>

  <line x1="570" y1="310" x2="740" y2="210" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Genie -->
  <rect x="650" y="260" width="180" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="740" y="295" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Genie Space</text>
  <text x="740" y="315" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">natural language</text>
  <text x="740" y="335" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">content analytics</text>

  <line x1="830" y1="310" x2="950" y2="230" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
