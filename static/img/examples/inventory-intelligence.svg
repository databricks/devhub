<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0f172a"/>
  <!-- Lakebase OLTP -->
  <rect x="40" y="40" width="180" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="130" y="80" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Lakebase</text>
  <text x="130" y="100" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">OLTP Postgres</text>
  <!-- CDC arrow -->
  <line x1="220" y1="90" x2="278" y2="90" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="249" y="82" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">CDC</text>
  <!-- Bronze -->
  <rect x="278" y="40" width="150" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="353" y="78" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="11">Bronze</text>
  <text x="353" y="98" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">lb_*_history</text>
  <!-- arrow -->
  <line x1="428" y1="90" x2="486" y2="90" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Silver -->
  <rect x="486" y="40" width="150" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="561" y="78" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11">Silver</text>
  <text x="561" y="98" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">SCD Type 1</text>
  <!-- arrow -->
  <line x1="636" y1="90" x2="694" y2="90" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Gold -->
  <rect x="694" y="40" width="155" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="771" y="75" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11">Gold</text>
  <text x="771" y="95" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">inventory_overview</text>
  <text x="771" y="112" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">low_stock_alerts</text>
  <!-- arrow to forecast job -->
  <line x1="849" y1="90" x2="907" y2="90" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Demand Forecast Job -->
  <rect x="907" y="40" width="253" height="100" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="1033" y="78" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="11">Demand Forecast Job</text>
  <text x="1033" y="98" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">pluggable forecast model</text>
  <!-- Vertical reverse sync arrow from Gold -->
  <line x1="771" y1="140" x2="771" y2="188" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="800" y="170" fill="#64748b" font-family="monospace" font-size="8">reverse sync</text>
  <!-- Lakebase sync (bottom left) -->
  <rect x="40" y="208" width="180" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="130" y="248" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Lakebase</text>
  <text x="130" y="268" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">*_sync tables</text>
  <!-- Arrow from Lakebase sync to App -->
  <line x1="220" y1="253" x2="330" y2="253" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Inventory Intelligence App -->
  <rect x="330" y="188" width="540" height="150" rx="12" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="600" y="224" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13">Inventory Intelligence</text>
  <text x="600" y="246" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Databricks App (AppKit)</text>
  <!-- Tab boxes -->
  <rect x="350" y="267" width="96" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="398" y="287" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Dashboard</text>
  <rect x="458" y="267" width="88" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="502" y="287" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Stores</text>
  <rect x="558" y="267" width="118" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="617" y="287" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Replenishment</text>
  <rect x="688" y="267" width="118" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="747" y="287" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Analytics/Genie</text>
  <!-- Bottom label -->
  <text x="600" y="370" text-anchor="middle" fill="#334155" font-family="monospace" font-size="10">Inventory Intelligence - End-to-End Example</text>
</svg>
